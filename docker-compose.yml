name: carpool

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: carpool
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carpool"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    image: node:20-bookworm-slim
    working_dir: /app
    command: >
      sh -c "lockfile_hash=$$(sha256sum package-lock.json | awk '{print $1}') &&
      installed_hash=$$(cat node_modules/.package-lock.hash 2>/dev/null || true) &&
      if [ ! -d node_modules/next ] || [ ! -d node_modules/next-auth ] ||
      [ \"$$lockfile_hash\" != \"$$installed_hash\" ]; then npm ci &&
      printf '%s' \"$$lockfile_hash\" > node_modules/.package-lock.hash; fi &&
      npm run prisma:generate &&
      npm run db:push &&
      npm run dev -- --hostname 0.0.0.0"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/carpool?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next

volumes:
  postgres_data:
  app_node_modules:
  app_next:
